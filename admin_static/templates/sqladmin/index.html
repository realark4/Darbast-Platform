{% extends "sqladmin/layout.html" %}

{% block content %}
<style>
    /* Dark OLED-style background */
    .dashboard-hero {
        min-height: calc(100vh - 120px);
        background: #090b10;
        background-image: 
            radial-gradient(circle at 20% 50%, rgba(0, 210, 255, 0.05), transparent 35%),
            radial-gradient(circle at 80% 40%, rgba(255, 0, 127, 0.05), transparent 35%);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        position: relative;
        overflow: hidden;
        border-radius: 16px;
        margin-top: 10px;
        box-shadow: inset 0 0 80px rgba(0,0,0,0.8);
        border: 1px solid rgba(255,255,255,0.05);
    }

    /* Subtle grid overlay */
    .dashboard-hero::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; bottom: 0;
        background: 
            linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
        background-size: 40px 40px;
        z-index: 1;
        pointer-events: none;
    }

    /* The glowing SVG container */
    .svg-container {
        position: relative;
        z-index: 2;
        width: 400px;
        height: 400px;
        animation: float 6s ease-in-out infinite;
    }

    .draw-line {
        stroke-dasharray: 500;
        stroke-dashoffset: 500;
        animation: drawLine 3s ease-out forwards;
    }

    @keyframes float {
        0% { transform: translateY(0px); }
        50% { transform: translateY(-15px); }
        100% { transform: translateY(0px); }
    }

    @keyframes drawLine {
        to { stroke-dashoffset: 0; }
    }

    /* Typographical styles */
    .hero-title {
        z-index: 2;
        margin-top: 1.5rem;
        font-size: 3rem;
        font-weight: 900;
        letter-spacing: 4px;
        color: #ffffff;
        text-transform: uppercase;
        background: linear-gradient(90deg, #00d2ff 0%, #3a7bd5 50%, #ff007f 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        animation: fadeInUp 1s ease-out forwards;
        opacity: 0;
        filter: drop-shadow(0 5px 15px rgba(0,210,255,0.3));
        text-align: center;
        line-height: 1.4;
        padding: 0 1rem;
    }

    .hero-subtitle {
        z-index: 2;
        margin-top: 0.2rem;
        font-size: 1.2rem;
        color: rgba(255, 255, 255, 0.6);
        font-family: 'Courier New', Courier, monospace;
        letter-spacing: 6px;
        animation: fadeInUp 1s ease-out 0.5s forwards;
        opacity: 0;
        text-align: center;
        line-height: 1.4;
        padding-bottom: 1rem;
    }

    @keyframes fadeInUp {
        from { transform: translateY(30px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
    }

    /* Decorative scanning line */
    .scanner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: rgba(0, 210, 255, 0.4);
        box-shadow: 0 0 15px rgba(0, 210, 255, 0.8);
        z-index: 3;
        animation: scan 5s linear infinite;
        opacity: 0;
    }

    @keyframes scan {
        0% { top: 0; opacity: 0; }
        15% { opacity: 0.5; }
        85% { opacity: 0.5; }
        100% { top: 100%; opacity: 0; }
    }
</style>

<div class="dashboard-hero">
    <div class="scanner"></div>

    <!-- Redesigned Clean AI Real Estate SVG -->
    <div class="svg-container">
        <svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
                    <feGaussianBlur stdDeviation="6" result="blur" />
                    <feMerge>
                        <feMergeNode in="blur" />
                        <feMergeNode in="SourceGraphic" />
                    </feMerge>
                </filter>
            </defs>

            <!-- Network lines -->
            <g stroke="rgba(255,255,255,0.15)" stroke-width="2">
                <line x1="200" y1="200" x2="80" y2="100" class="draw-line" />
                <line x1="200" y1="200" x2="320" y2="100" class="draw-line" />
                <line x1="200" y1="200" x2="350" y2="240" class="draw-line" />
                <line x1="200" y1="200" x2="280" y2="340" class="draw-line" />
                <line x1="200" y1="200" x2="120" y2="340" class="draw-line" />
                <line x1="200" y1="200" x2="50" y2="240" class="draw-line" />
            </g>

            <!-- Animated Data Packets Flowing to Center -->
            <g fill="#00d2ff">
                <circle r="4"><animateMotion dur="2.5s" repeatCount="indefinite" path="M80,100 L200,200"/></circle>
                <circle r="4"><animateMotion dur="3.2s" repeatCount="indefinite" path="M320,100 L200,200"/></circle>
                <circle r="4"><animateMotion dur="2.8s" repeatCount="indefinite" path="M350,240 L200,200"/></circle>
                <circle r="4"><animateMotion dur="3.5s" repeatCount="indefinite" path="M280,340 L200,200"/></circle>
                <circle r="4"><animateMotion dur="2.1s" repeatCount="indefinite" path="M120,340 L200,200"/></circle>
                <circle r="4"><animateMotion dur="3.0s" repeatCount="indefinite" path="M50,240 L200,200"/></circle>
            </g>

            <!-- Outer Nodes -->
            <circle cx="80" cy="100" r="10" fill="#3a7bd5" filter="url(#glow)">
                <animate attributeName="r" values="8;12;8" dur="2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="320" cy="100" r="12" fill="#ff007f" filter="url(#glow)">
                <animate attributeName="r" values="10;14;10" dur="2.5s" repeatCount="indefinite"/>
            </circle>
            <circle cx="350" cy="240" r="8" fill="#00d2ff" filter="url(#glow)">
                <animate attributeName="r" values="6;10;6" dur="3s" repeatCount="indefinite"/>
            </circle>
            <circle cx="280" cy="340" r="14" fill="#3a7bd5" filter="url(#glow)">
                <animate attributeName="r" values="12;16;12" dur="2.2s" repeatCount="indefinite"/>
            </circle>
            <circle cx="120" cy="340" r="9" fill="#ff007f" filter="url(#glow)">
                <animate attributeName="r" values="7;11;7" dur="2.7s" repeatCount="indefinite"/>
            </circle>
            <circle cx="50" cy="240" r="11" fill="#00d2ff" filter="url(#glow)">
                <animate attributeName="r" values="9;13;9" dur="1.8s" repeatCount="indefinite"/>
            </circle>

            <!-- Central AI Core Hexagon -->
            <polygon points="200,130 260,165 260,235 200,270 140,235 140,165" fill="#090b10" stroke="#00d2ff" stroke-width="4" filter="url(#glow)">
                <animate attributeName="stroke" values="#00d2ff;#ff007f;#3a7bd5;#00d2ff" dur="8s" repeatCount="indefinite" />
            </polygon>

            <!-- Minimalist House Icon Inside Core -->
            <path d="M200,160 L235,190 L235,240 L165,240 L165,190 Z" fill="none" stroke="#ffffff" stroke-width="3" stroke-linejoin="round"/>
            <path d="M185,240 L185,210 L215,210 L215,240" fill="none" stroke="#ffffff" stroke-width="2" stroke-linejoin="round"/>
            <circle cx="200" cy="200" r="3" fill="#ffffff">
                 <animate attributeName="opacity" values="0.2;1;0.2" dur="2s" repeatCount="indefinite" />
            </circle>

            <!-- Ambient Rotating Rings -->
            <circle cx="200" cy="200" r="110" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2" stroke-dasharray="10 20">
                <animateTransform attributeName="transform" type="rotate" from="0 200 200" to="360 200 200" dur="20s" repeatCount="indefinite" />
            </circle>
            <circle cx="200" cy="200" r="140" fill="none" stroke="rgba(0,212,255,0.15)" stroke-width="1.5" stroke-dasharray="40 10 5 10">
                <animateTransform attributeName="transform" type="rotate" from="360 200 200" to="0 200 200" dur="30s" repeatCount="indefinite" />
            </circle>
        </svg>
    </div>

    <!-- Welcome Titles -->
    <h1 class="hero-title">DARBast Platform</h1>
    <h2 class="hero-subtitle">AI-BASED ADMINISTRATION</h2>
</div>
{% endblock %}
